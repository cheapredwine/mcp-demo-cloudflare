name: Deploy MCP Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test

  deploy-server:
    runs-on: ubuntu-latest
    name: Deploy MCP Server
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Debug - Check Token
        shell: bash
        run: |
          echo "=========================================="
          echo "TOKEN DEBUG INFO"
          echo "=========================================="
          if [ -z "$CF_TOKEN" ]; then
            echo "❌ TOKEN IS NOT SET"
            echo "Please add CLOUDFLARE_API_TOKEN secret at:"
            echo "https://github.com/cheapredwine/mcp-demo-cloudflare/settings/secrets/actions"
            exit 1
          else
            echo "✅ TOKEN IS SET"
            echo "Token starts with: ${CF_TOKEN:0:10}"
            echo "Token length: ${#CF_TOKEN}"
          fi
          echo "=========================================="
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Deploy MCP Server
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/mcp-server
          command: deploy

  deploy-client:
    runs-on: ubuntu-latest
    name: Deploy MCP Client
    needs: [test, deploy-server]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy MCP Client
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/workers-client
          command: deploy
      
      - name: Update Client Environment Variable
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/workers-client
          command: vars put MCP_SERVER_URL https://mcp-demo-server.jsherron-test-account.workers.dev
      
      - name: Post Deploy Info
        run: |
          echo "✅ MCP Demo deployed successfully!"
          echo ""
          echo "📡 MCP Server: https://mcp-demo-server.jsherron-test-account.workers.dev"
          echo "🌐 MCP Client: https://mcp-demo-client.jsherron-test-account.workers.dev"
          echo ""
