name: Deploy MCP Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy-mcp-server:
    runs-on: ubuntu-latest
    name: Deploy MCP Server
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy MCP Server
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/mcp-server
          command: deploy

  deploy-ai-orchestrator:
    runs-on: ubuntu-latest
    name: Deploy AI Orchestrator
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject build timestamp
        run: node packages/ai-orchestrator/scripts/inject-timestamp.js

      - name: Deploy AI Orchestrator
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/ai-orchestrator
          command: deploy

  post-deploy:
    runs-on: ubuntu-latest
    name: Deployment Summary
    needs: [deploy-mcp-server, deploy-ai-orchestrator]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Post Deploy Summary
        run: |
          echo "✅ Deployment complete!"
          echo ""
          echo "📡 MCP Server: https://mcp-demo-server.jsherron-test-account.workers.dev"
          echo "🤖 AI Orchestrator: https://mcp-demo-ai-orchestrator.jsherron-test-account.workers.dev"
          echo ""
          echo "🛡️  Security: See README.md Security Configuration section"
