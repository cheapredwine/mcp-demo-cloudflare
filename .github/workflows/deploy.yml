name: Deploy MCP Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
      
      - name: Type check
        run: npm run typecheck

  deploy-server:
    runs-on: ubuntu-latest
    name: Deploy MCP Server
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy MCP Server
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/mcp-server
          command: deploy

  deploy-client:
    runs-on: ubuntu-latest
    name: Deploy MCP Client
    needs: [test, deploy-server]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy MCP Client
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/workers-client
          command: deploy
      
      - name: Post Deploy Info
        run: |
          echo "✅ MCP Client deployed!"
          echo ""
          echo "⚠️  IMPORTANT: Update MCP_SERVER_URL secret to point to your server:"
          echo "   1. Go to Cloudflare Dashboard > Workers & Pages"
          echo "   2. Select 'mcp-demo-client'"
          echo "   3. Settings > Variables > Add variable 'MCP_SERVER_URL'"
          echo "   4. Value: https://mcp-demo-server.<your-account>.workers.dev"
