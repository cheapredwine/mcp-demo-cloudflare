name: Deploy MCP Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test

  deploy-server:
    runs-on: ubuntu-latest
    name: Deploy MCP Server
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check secrets
        run: |
          echo "Checking secrets..."
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID is not set!"
            echo "Please add it at: https://github.com/cheapredwine/mcp-demo-cloudflare/settings/secrets/actions"
            exit 1
          fi
          echo "✅ All secrets are set"
      
      - name: Deploy MCP Server
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/mcp-server
          command: deploy

  deploy-client:
    runs-on: ubuntu-latest
    name: Deploy MCP Client
    needs: [test, deploy-server]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Add account_id to wrangler.toml
        run: |
          cd packages/workers-client
          echo "" >> wrangler.toml
          echo "account_id = \"${{ secrets.CLOUDFLARE_ACCOUNT_ID }}\"" >> wrangler.toml
          echo "Updated wrangler.toml:"
          cat wrangler.toml
      
      - name: Deploy MCP Client
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/workers-client
          command: deploy
      
      - name: Update MCP_SERVER_URL in wrangler.toml
        working-directory: packages/workers-client
        run: |
          # Replace the localhost URL with the deployed server URL
          sed -i 's|MCP_SERVER_URL = "http://localhost:8787"|MCP_SERVER_URL = "https://mcp-demo-server.jsherron-test-account.workers.dev"|' wrangler.toml
          echo "Updated wrangler.toml:"
          cat wrangler.toml
      
      - name: Post Deploy Info
        run: |
          echo "✅ MCP Demo deployed successfully!"
          echo ""
          echo "📡 MCP Server: https://mcp-demo-server.jsherron-test-account.workers.dev"
          echo "🌐 MCP Client: https://mcp-demo-client.jsherron-test-account.workers.dev"
          echo ""
