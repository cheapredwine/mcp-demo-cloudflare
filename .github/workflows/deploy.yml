name: Deploy MCP Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug Info
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== All files ==="
          ls -la
          echo "=== package.json contents ==="
          cat package.json
          echo "=== Scripts in package.json ==="
          node -e "console.log(JSON.parse(require('fs').readFileSync('package.json')).scripts)"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test

  deploy-server:
    runs-on: ubuntu-latest
    name: Deploy MCP Server
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check wrangler config
        run: |
          cd packages/mcp-server
          echo "=== wrangler.toml ==="
          cat wrangler.toml
          echo "=== src/index.ts exists? ==="
          ls -la src/index.ts
      
      - name: Deploy MCP Server
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/mcp-server
          command: deploy

  deploy-client:
    runs-on: ubuntu-latest
    name: Deploy MCP Client
    needs: [test, deploy-server]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy MCP Client
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/workers-client
          command: deploy
      
      - name: Update Client Environment Variable
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: packages/workers-client
          command: vars put MCP_SERVER_URL https://mcp-demo-server.jsherron-test-account.workers.dev
      
      - name: Post Deploy Info
        run: |
          echo "✅ MCP Demo deployed successfully!"
          echo ""
          echo "📡 MCP Server: https://mcp-demo-server.jsherron-test-account.workers.dev"
          echo "🌐 MCP Client: https://mcp-demo-client.jsherron-test-account.workers.dev"
          echo ""
