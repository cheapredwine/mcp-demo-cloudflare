name = "mcp-demo-client"
main = "src/index.ts"
compatibility_date = "2025-03-21"
compatibility_flags = ["nodejs_compat"]

# Enable observability for logging
[observability]
enabled = true

# Service binding to connect to MCP server worker
[[services]]
binding = "MCP_SERVER"
service = "mcp-demo-server"

# Environment variables
[vars]
MCP_SERVER_URL = "https://mcp-demo-server.jsherron-test-account.workers.dev"
